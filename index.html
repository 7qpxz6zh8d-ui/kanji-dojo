// ============================================================
// FURIGANA CONTEXT & <JP> HELPER
// ============================================================
// Context avoids prop-drilling the toggle through every component.
const FuriganaContext = createContext(false);

// <JP text="漢字" reading="かんじ" /> renders:
//   - Furigana OFF: just "漢字"
//   - Furigana ON: ruby markup with "かんじ" above "漢字"
//
// For mixed strings (e.g., "第1 Set"), pass a `pairs` array instead:
//   <JP pairs={[["第", "だい"], "1 Set"]} />
//   Each item: tuple = [kanji, reading]; plain string = no reading.
function JP({ text, reading, pairs, style }) {
  const showFurigana = useContext(FuriganaContext);

  if (pairs) {
    return (
      <span style={style}>
        {pairs.map((p, i) => {
          if (Array.isArray(p)) {
            const [kanji, rt] = p;
            if (showFurigana && rt) {
              return (
                <ruby key={i} style={styles.jpRuby}>
                  {kanji}<rt style={styles.jpRt}>{rt}</rt>
                </ruby>
              );
            }
            return <span key={i}>{kanji}</span>;
          }
          return <span key={i}>{p}</span>;
        })}
      </span>
    );
  }

  if (showFurigana && reading) {
    return (
      <ruby style={{ ...styles.jpRuby, ...style }}>
        {text}<rt style={styles.jpRt}>{reading}</rt>
      </ruby>
    );
  }
  return <span style={style}>{text}</span>;
}

// Renders a level's label (e.g. "一年生 · Grade 1") with furigana on the kanji portion
// when the toggle is on.
function LevelTitle({ levelObj }) {
  if (!levelObj) return null;
  const parts = levelObj.label.split(' · ');
  const jp = parts[0];
  const rest = parts.slice(1).join(' · ');
  return (
    <>
      <JP text={jp} reading={levelObj.furigana} />
      {rest && ` · ${rest}`}
    </>
  );
}

// ============================================================
// SPACED REPETITION (SM-2 simplified)
// Intervals in days: 1 → 3 → 7 → 14 → 30 → 90
// ============================================================
const INTERVALS = [1, 3, 7, 14, 30, 90];
const MS_PER_DAY = 1000 * 60 * 60 * 24;

const getDueStatus = (card) => {
  if (!card || !card.nextReview) return 'new';
  const now = Date.now();
  if (now >= card.nextReview) return 'due';
  return 'learning';
};

const updateCardAfterReview = (card, quality) => {
  // quality: 0=again, 1=hard, 2=good, 3=easy
  const now = Date.now();
  let stage = card?.stage ?? 0;
  let totalReviews = (card?.totalReviews ?? 0) + 1;
  let totalCorrect = (card?.totalCorrect ?? 0) + (quality >= 2 ? 1 : 0);
  let totalLapses = (card?.totalLapses ?? 0) + (quality === 0 ? 1 : 0);

  if (quality === 0) {
    stage = 0;
  } else if (quality === 1) {
    stage = Math.max(0, stage);
  } else if (quality === 2) {
    stage = Math.min(INTERVALS.length - 1, stage + 1);
  } else {
    stage = Math.min(INTERVALS.length - 1, stage + 2);
  }

  const interval = INTERVALS[stage];
  const nextReview = now + interval * MS_PER_DAY;

  return {
    stage,
    nextReview,
    lastReview: now,
    totalReviews,
    totalCorrect,
    totalLapses,
  };
};

// localStorage fallback for offline resilience
const lsGet = (key) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; } };
const lsSet = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

const getProgressKey = (level) => `kanji_progress_${level}`;
const STATS_KEY = 'kanji_stats';
const PREFS_KEY = 'kanji_prefs';

const loadProgress = async (level) => {
  const key = getProgressKey(level);
  try {
    const remote = await sbGet(key);
    if (remote) { lsSet(key, remote); return remote; }
  } catch {}
  return lsGet(key) || {};
};

const saveProgress = async (level, progress) => {
  const key = getProgressKey(level);
  lsSet(key, progress);
  try { await sbSet(key, progress); } catch (e) { console.error('Save failed', e); }
};

const loadStats = async () => {
  try {

    if (remote) { lsSet(STATS_KEY, remote); return remote; }

// ============================================================
// EXPORT / IMPORT
// ============================================================
const EXPORT_VERSION = 1;
const ALL_LEVELS = ['radicals', 'grade1', 'grade2', 'grade3', 'grade4', 'grade5', 'grade6'];

// Gathers every piece of progress data across all levels into one bundle.
const buildExportBundle = async () => {
  const progressByLevel = {};
  for (const lvl of ALL_LEVELS) {
    progressByLevel[lvl] = await loadProgress(lvl);
  }
  const stats = await loadStats();
  const prefs = await loadPrefs();
  return {
    version: EXPORT_VERSION,
    exportedAt: new Date().toISOString(),
    app: 'kanji-dojo',
    progressByLevel,
    stats,
    prefs,
  };
};

// Writes every piece of the bundle back to storage.
const restoreBundle = async (bundle) => {
  if (!bundle || bundle.app !== 'kanji-dojo') {
    throw new Error('This does not look like a Kanji Dōjō backup file.');
  }
  if (bundle.version > EXPORT_VERSION) {
    throw new Error('This backup was made with a newer version of the app.');
  }
  const { progressByLevel = {}, stats, prefs } = bundle;
  for (const lvl of ALL_LEVELS) {
    if (progressByLevel[lvl]) {
      await saveProgress(lvl, progressByLevel[lvl]);
    }
  }
  if (stats) await saveStats(stats);
  if (prefs) await savePrefs(prefs);
};

// Triggers a browser download of the given JSON bundle.
const downloadBundle = (bundle) => {
  const json = JSON.stringify(bundle, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
  const a = document.createElement('a');
  a.href = url;
  a.download = `kanji-dojo-backup-${today}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
};

// Reads a File (from an <input type=file>) and parses it as JSON.
const readBundleFile = (file) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      resolve(JSON.parse(reader.result));
    } catch {
      reject(new Error("Couldn't read that file — it may not be valid JSON."));
    }
  };
  reader.onerror = () => reject(new Error('File could not be read.'));
  reader.readAsText(file);
});

// Quick summary stats for the confirmation dialog before restoring.
const summarizeBundle = (bundle) => {
  if (!bundle?.progressByLevel) return 'No progress data found.';
  let total = 0;
  const perLevel = [];
  for (const lvl of ALL_LEVELS) {
    const p = bundle.progressByLevel[lvl] || {};
    const count = Object.values(p).filter(c => c && c.totalReviews > 0).length;
    if (count > 0) perLevel.push(`${lvl}: ${count}`);
    total += count;
  }
  const when = bundle.exportedAt
    ? new Date(bundle.exportedAt).toLocaleString()
    : 'unknown date';
  return `Exported ${when}\n${total} kanji with review history${perLevel.length ? `\n(${perLevel.join(', ')})` : ''}`;
};

const SET_SIZE = 10;

function KanjiApp() {
  const [level, setLevel] = useState('radicals');
  const [mode, setMode] = useState('dashboard'); // dashboard | setPicker | learn | match | quiz
  const [currentSet, setCurrentSet] = useState(0); // which set of 10 the user selected
  const [progress, setProgress] = useState({});
  const [stats, setStats] = useState({ lastStudyDate: null, streak: 0, totalReviews: 0 });
  const [showFurigana, setShowFurigana] = useState(false);
  const [loading, setLoading] = useState(true);

  // Load progress when level changes
  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    setCurrentSet(0);
    (async () => {
      const p = await loadProgress(level);
      const s = await loadStats();
      if (!cancelled) {
        setProgress(p);
        setStats(s);
        setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [level]);

  // Load prefs once on mount
  useEffect(() => {
    (async () => {
      const p = await loadPrefs();
      setShowFurigana(!!p.showFurigana);
    })();
  }, []);

  const toggleFurigana = async () => {
    const next = !showFurigana;
    setShowFurigana(next);
    await savePrefs({ showFurigana: next });
  };

  // Update a single card's progress
  const updateCard = async (char, quality) => {
    const current = progress[char] || {};
    const updated = updateCardAfterReview(current, quality);
    const newProgress = { ...progress, [char]: updated };
    setProgress(newProgress);
    await saveProgress(level, newProgress);

    // Update streak/stats
    const today = new Date().toDateString();
    const last = stats.lastStudyDate;
    let streak = stats.streak || 0;
    if (last !== today) {
      const yesterday = new Date(Date.now() - MS_PER_DAY).toDateString();
      streak = last === yesterday ? streak + 1 : 1;
    }
    const newStats = {
      lastStudyDate: today,
      streak,
      totalReviews: (stats.totalReviews || 0) + 1,
    };
    setStats(newStats);
    await saveStats(newStats);
  };

  const kanjiList = KANJI_DATA[level] || [];

  // Enrich kanji with progress, then deduplicate by character —
  // merging meanings for any kanji that appears more than once in a level.
  const enriched = useMemo(() => {
    const seen = new Map();
    for (const k of kanjiList) {
      if (seen.has(k.char)) {
        const existing = seen.get(k.char);
        // Merge meanings if different (e.g. "earth / soil" + "soil" → "earth / soil")
        const meanings = new Set([
          ...existing.meaning.split(' / '),
          ...k.meaning.split(' / '),
        ]);
        existing.meaning = [...meanings].join(' / ');
      } else {
        seen.set(k.char, {
          ...k,
          ...(progress[k.char] || {}),
          status: getDueStatus(progress[k.char]),
        });
      }
    }
    return [...seen.values()];
  }, [kanjiList, progress]);

  // Break kanji into sets of 10
  const sets = useMemo(() => {
    const result = [];
    for (let i = 0; i < enriched.length; i += SET_SIZE) {
      const setCards = enriched.slice(i, i + SET_SIZE);
      const learned = setCards.filter(c => c.totalReviews > 0).length;
      const mastered = setCards.filter(c => (c.stage ?? 0) >= 4).length;
      const due = setCards.filter(c => c.status === 'due').length;
      result.push({
        index: result.length,
        cards: setCards,
        learned,
        mastered,
        due,
        total: setCards.length,
        isComplete: learned === setCards.length,
        isMastered: mastered === setCards.length,
      });
    }
    return result;
  }, [enriched]);

  // The current set's cards, ordered: new first, then due, then others
  const activeCards = useMemo(() => {
    const set = sets[currentSet];
    if (!set) return [];
    const newOnes = set.cards.filter(c => c.status === 'new');
    const dueOnes = set.cards.filter(c => c.status === 'due');
    const others = set.cards.filter(c => c.status === 'learning');
    return [...newOnes, ...dueOnes, ...others];
  }, [sets, currentSet]);

  const dueCards = enriched.filter(c => c.status === 'due' || c.status === 'new');
  const learnedCards = enriched.filter(c => c.totalReviews > 0);
  const masteredCards = enriched.filter(c => (c.stage ?? 0) >= 4);
  const weakCards = enriched
    .filter(c => c.totalReviews >= 2 && (c.totalLapses ?? 0) / c.totalReviews >= 0.3)
    .sort((a, b) => (b.totalLapses / b.totalReviews) - (a.totalLapses / a.totalReviews));

  return (
    <FuriganaContext.Provider value={showFurigana}>
    <div style={styles.root}>
      <style>{globalCss}</style>
      <Header level={level} setLevel={setLevel} mode={mode} setMode={setMode} stats={stats} showFurigana={showFurigana} toggleFurigana={toggleFurigana} />

      {loading ? (
        <div style={styles.loading}><JP pairs={[['筆', 'ふで'], 'を', ['準備中', 'じゅんびちゅう']]} />…</div>
      ) : (
        <main style={styles.main}>
          {mode === 'dashboard' && (
            <Dashboard
              enriched={enriched}
              dueCards={dueCards}
              learnedCards={learnedCards}
              masteredCards={masteredCards}
              weakCards={weakCards}
              stats={stats}
              setMode={setMode}
              levelObj={LEVELS.find(l => l.id === level)}
            />
          )}
          {mode === 'setPicker' && (
            <SetPicker
              sets={sets}
              onSelectSet={(i) => { setCurrentSet(i); setMode('learn'); }}
              onBack={() => setMode('dashboard')}
              levelObj={LEVELS.find(l => l.id === level)}
            />
          )}
          {mode === 'learn' && (
            <LearnMode
              cards={activeCards}
              setNumber={currentSet + 1}
              totalSets={sets.length}
              showFurigana={showFurigana}
              onReview={updateCard}
              onDone={() => setMode('setPicker')}
              onBackToDashboard={() => setMode('dashboard')}
            />
          )}
          {mode === 'match' && (
            <MatchMode
              cards={learnedCards.length >= 6 ? learnedCards : enriched.slice(0, 8)}
              onDone={() => setMode('dashboard')}
            />
          )}
          {mode === 'quiz' && (
            <QuizMode
              cards={learnedCards.length >= 4 ? learnedCards : enriched}
              allCards={enriched}
              showFurigana={showFurigana}
              onReview={updateCard}
              onDone={() => setMode('dashboard')}
            />
          )}
        </main>
      )}

      <Footer />
    </div>
    </FuriganaContext.Provider>
  );
}

// ============================================================
// BACKUP PANEL (Export / Import progress)
// ============================================================
function BackupPanel({ totalReviews }) {
  const [status, setStatus] = useState(null); // { kind: 'success'|'error'|'info', text: string }
  const [busy, setBusy] = useState(false);
  const fileInputRef = useRef(null);

  const handleExport = async () => {
    if (busy) return;
    setBusy(true);
    setStatus(null);
    try {
      const bundle = await buildExportBundle();
      downloadBundle(bundle);
      setStatus({ kind: 'success', text: 'Backup saved. Keep it in iCloud Drive or email it to yourself.' });
    } catch (e) {
      setStatus({ kind: 'error', text: 'Export failed: ' + (e.message || 'unknown error') });
    } finally {
      setBusy(false);
    }
  };

  const handleImportClick = () => {
    if (busy) return;
    fileInputRef.current?.click();
  };

  const handleFileSelected = async (e) => {
    const file = e.target.files?.[0];
    // Reset the input so the same file can be re-selected later if needed.
    e.target.value = '';
    if (!file) return;

    setBusy(true);
    setStatus(null);

    try {
      const bundle = await readBundleFile(file);
      const summary = summarizeBundle(bundle);

      // If the device already has meaningful progress, require explicit confirmation.
      const warning = totalReviews > 0
        ? `\n\n⚠️  This device has ${totalReviews} reviews logged. Importing will REPLACE them.`
        : '';

      const ok = window.confirm(
        `Restore this backup?\n\n${summary}${warning}\n\nThe page will reload after restoring.`
      );
      if (!ok) {
        setBusy(false);
        return;
      }

      await restoreBundle(bundle);
      setStatus({ kind: 'success', text: 'Backup restored. Reloading…' });
      setTimeout(() => window.location.reload(), 700);
    } catch (e) {
      setStatus({ kind: 'error', text: e.message || 'Import failed.' });
      setBusy(false);
    }
  };

  return (
    <div style={styles.panel}>
      <h2 style={styles.panelTitle}>
        <JP text="書庫" reading="しょこ" /> · Backup & Restore
      </h2>
      <p style={styles.backupBlurb}>
        Claude stores progress per-device. Export a backup to keep it safe or move
        it to another device — drop the file in iCloud Drive to keep your iPhone and Mac in sync.
      </p>

      <div style={styles.backupButtonRow}>
        <button
          onClick={handleExport}
          disabled={busy}
          style={{ ...styles.backupBtn, ...styles.backupBtnPrimary }}
        >
          ↓ Export backup
        </button>
        <button
          onClick={handleImportClick}
          disabled={busy}
          style={{ ...styles.backupBtn, ...styles.backupBtnSecondary }}
        >
          ↑ Import backup
        </button>
        <input
          ref={fileInputRef}
          type="file"
          accept="application/json,.json"
          onChange={handleFileSelected}
          style={{ display: 'none' }}
        />
      </div>

      {status && (
        <div
          style={{
            ...styles.backupStatus,
            ...(status.kind === 'success' ? styles.backupStatusSuccess : {}),
            ...(status.kind === 'error' ? styles.backupStatusError : {}),
          }}
        >
          {status.text}
        </div>
      )}

      <div style={styles.backupHint}>
        Tip: back up weekly, or whenever you complete a set. Importing on an iPhone:
        open Files → iCloud Drive → tap the backup → share to Claude → then tap Import here.
      </div>
    </div>
  );
}

function EnsoCircle({ progress }) {
  // Zen circle that fills as progress grows
  const circumference = 2 * Math.PI * 80;
  const offset = circumference * (1 - progress);
  return (
    <svg viewBox="0 0 200 200" style={{ width: '100%', height: '100%', maxWidth: 220 }}>
      <circle cx="100" cy="100" r="80" fill="none" stroke={palette.washiDark} strokeWidth="6" />
      <circle
        cx="100" cy="100" r="80"
        fill="none"
        stroke={palette.sumi}
        strokeWidth="10"
        strokeLinecap="round"
        strokeDasharray={circumference}
        strokeDashoffset={offset}
        transform="rotate(-90 100 100)"
        style={{ transition: 'stroke-dashoffset 0.8s ease' }}
      />
      <text x="100" y="108" textAnchor="middle" fontSize="32" fontFamily={fontDisplay} fill={palette.sumi} fontWeight="600">
        {Math.round(progress * 100)}%
      </text>
    </svg>
  );
}

// ============================================================
// LEARN MODE (Flashcards with binary rating)
// ============================================================
function LearnMode({ cards, setNumber, totalSets, showFurigana, onReview, onDone, onBackToDashboard }) {
  const [index, setIndex] = useState(0);
  const [revealedIndex, setRevealedIndex] = useState(-1);
  const revealed = revealedIndex === index;
  const [results, setResults] = useState({ known: 0, unknown: 0 });
  const [finished, setFinished] = useState(false);
  // useRef updates synchronously — unlike useState it blocks double-clicks
  // before React even has a chance to re-render.
  const processingRef = useRef(false);

  if (cards.length === 0) {
    return (
      <div style={styles.emptyScreen}>
        <div style={styles.emptyKanji}><JP text="休" reading="やす" /></div>
        <h2>This set is empty.</h2>
        <p>Pick another set to study.</p>
        <button onClick={onDone} style={styles.ctaPrimary}>Back to sets</button>
      </div>
    );
  }

  if (finished) {
    const total = results.known + results.unknown;
    const accuracy = total > 0 ? Math.round((results.known / total) * 100) : 0;
    return (
      <div style={styles.emptyScreen}>
        <div style={styles.emptyKanji}><JP text="完" reading="かん" /></div>
        <h2>Set {setNumber} complete</h2>
        <div style={styles.completeStats}>
          <div style={styles.completeStat}>
            <div style={{ ...styles.completeStatValue, color: palette.jade }}>{results.known}</div>
            <div style={styles.completeStatLabel}>knew it</div>
          </div>
          <div style={styles.completeStat}>
            <div style={{ ...styles.completeStatValue, color: palette.vermilion }}>{results.unknown}</div>
            <div style={styles.completeStatLabel}>didn't know</div>
          </div>
          <div style={styles.completeStat}>
            <div style={{ ...styles.completeStatValue, color: palette.sumi }}>{accuracy}%</div>
            <div style={styles.completeStatLabel}>accuracy</div>
          </div>
        </div>
        <p style={{ color: palette.mist, marginBottom: 24 }}>
          {results.unknown === 0
            ? <><JP text="完璧" reading="かんぺき" />! Perfect recall.</>
            : results.known === 0
              ? 'First exposure is the hardest. These will return tomorrow.'
              : 'Kanji you missed will return sooner. Rest well.'}
        </p>
        <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
          <button onClick={onDone} style={styles.ctaPrimary}>Choose another set</button>
          <button onClick={onBackToDashboard} style={styles.ctaSecondary}>Dashboard</button>
        </div>
      </div>
    );
  }

  const card = cards[index];
  const hasReadings = (card.on && card.on.length > 0) || (card.kun && card.kun.length > 0);

  const [processing, setProcessing] = useState(false);

  const handleReview = async (knew) => {
    if (processingRef.current) return;
    processingRef.current = true;
    setProcessing(true);
    setRevealedIndex(-1);
    const quality = knew ? 2 : 0;
    await onReview(card.char, quality);
    setResults(r => ({
      known: r.known + (knew ? 1 : 0),
      unknown: r.unknown + (knew ? 0 : 1),
    }));
    if (index + 1 >= cards.length) {
      processingRef.current = false;
      setProcessing(false);
      setFinished(true);
    } else {
      setIndex(i => i + 1);
      processingRef.current = false;
      setProcessing(false);
    }
  };

  return (
    <div style={styles.studyArea}>
      <div style={styles.studyHeader}>
        <div style={styles.studyProgress}>
          <div style={styles.studyCount}>
            Set {setNumber} of {totalSets} · Card {index + 1} / {cards.length}
          </div>
          <div style={styles.studyBar}>
            <div style={{ ...styles.studyBarFill, width: `${((index) / cards.length) * 100}%` }} />
          </div>
        </div>
        <button onClick={onDone} style={styles.exitBtn}>✕ End session</button>
      </div>

      <div style={{ ...styles.flashcard, ...(revealed ? styles.flashcardRevealed : {}) }}>
        {!revealed ? (
          <>
            {showFurigana && hasReadings && (
              <ReadingRow on={card.on} kun={card.kun} />
            )}
            <div style={styles.flashKanji}>{card.char}</div>
            <button
              onClick={(e) => { e.stopPropagation(); setRevealedIndex(index); }}
              style={styles.revealBtn}
            >
              Tap to reveal meaning
            </button>
          </>
        ) : (
          <>
            <div style={styles.flashKanjiSmall}>{card.char}</div>
            {hasReadings && (
              <ReadingRow on={card.on} kun={card.kun} revealed />
            )}
            <div style={styles.flashMeaning}>{card.meaning}</div>
            <div style={styles.flashMeta}>
              {card.totalReviews > 0
                ? `Stage ${(card.stage ?? 0) + 1} of ${INTERVALS.length} · seen ${card.totalReviews}x`
                : 'New card'}
            </div>
          </>
        )}
      </div>

      {revealed && (
        <div style={styles.binaryRow}>
          <button
            onClick={(e) => { e.stopPropagation(); handleReview(false); }}
            disabled={processing}
            style={{ ...styles.binaryBtn, background: palette.vermilion, opacity: processing ? 0.6 : 1 }}
          >
            <div style={styles.binaryBtnLabel}><JP pairs={[['知', 'し'], 'らない']} /></div>
            <div style={styles.binaryBtnSub}>I don't know it</div>
          </button>
          <button
            onClick={(e) => { e.stopPropagation(); handleReview(true); }}
            disabled={processing}
            style={{ ...styles.binaryBtn, background: palette.jade, opacity: processing ? 0.6 : 1 }}
          >
            <div style={styles.binaryBtnLabel}><JP pairs={[['知', 'し'], 'ってる']} /></div>
            <div style={styles.binaryBtnSub}>I know it</div>
          </button>
        </div>
      )}

      {!revealed && (
        <div style={styles.hint}>
          Recall the meaning in your head first, then tap the card.
        </div>
      )}

      <div style={styles.sessionRunningTally}>
        <span style={{ color: palette.jade }}>● {results.known}</span>
        <span style={{ color: palette.vermilion }}>● {results.unknown}</span>
      </div>
    </div>
  );
}

// Shared reading row used in Learn & Quiz.
// `revealed` = styled as part of the answer reveal (larger, more prominent).
function ReadingRow({ on, kun, revealed }) {
  const hasOn = on && on.length > 0;
  const hasKun = kun && kun.length > 0;
  if (!hasOn && !hasKun) return null;
  return (
    <div style={revealed ? styles.readingRowRevealed : styles.readingRow}>
      {hasOn && (
        <div style={revealed ? styles.readingGroupRevealed : styles.readingGroup}>
          <span style={styles.readingTag}>音</span>
          <span style={revealed ? styles.readingTextRevealed : styles.readingText}>{on}</span>
        </div>
      )}
      {hasKun && (
        <div style={revealed ? styles.readingGroupRevealed : styles.readingGroup}>
          <span style={{...styles.readingTag, background: palette.jade}}>訓</span>
          <span style={revealed ? styles.readingTextRevealed : styles.readingText}>{kun}</span>
        </div>
      )}
    </div>
  );
}

// ============================================================
// MATCH MODE (Memory game)
// ============================================================
function MatchMode({ cards, onDone }) {
  const [pool, setPool] = useState([]);
  const [flipped, setFlipped] = useState([]);
  const [matched, setMatched] = useState([]);
  const [moves, setMoves] = useState(0);
  const [startTime] = useState(Date.now());
  const [won, setWon] = useState(false);

  useEffect(() => {
    // Take 8 random cards and build pairs
    const shuffled = [...cards].sort(() => Math.random() - 0.5).slice(0, 8);
    const deck = [];
    shuffled.forEach((c, i) => {
      deck.push({ id: `k-${i}`, pairId: i, type: 'kanji', char: c.char, meaning: c.meaning });
      deck.push({ id: `m-${i}`, pairId: i, type: 'meaning', char: c.char, meaning: c.meaning });
    });
    setPool(deck.sort(() => Math.random() - 0.5));
    setFlipped([]);
    setMatched([]);
    setMoves(0);
    setWon(false);
  }, []);

  useEffect(() => {
    if (flipped.length === 2) {
      setMoves(m => m + 1);
      const [a, b] = flipped;
      if (a.pairId === b.pairId && a.type !== b.type) {
        setTimeout(() => {
          setMatched(prev => [...prev, a.pairId]);
          setFlipped([]);
        }, 500);
      } else {
        setTimeout(() => setFlipped([]), 900);
      }
    }
  }, [flipped]);

  useEffect(() => {
    if (pool.length > 0 && matched.length === pool.length / 2) {
      setWon(true);
    }
  }, [matched, pool]);

  const handleFlip = (card) => {
    if (flipped.length >= 2) return;
    if (flipped.find(f => f.id === card.id)) return;
    if (matched.includes(card.pairId)) return;
    setFlipped([...flipped, card]);
  };

  if (won) {
    const elapsed = Math.round((Date.now() - startTime) / 1000);
    return (
      <div style={styles.emptyScreen}>
        <div style={styles.emptyKanji}><JP text="勝" reading="か" /></div>
        <h2><JP text="見事" reading="みごと" />!  Well matched.</h2>
        <p>{moves} moves · {elapsed} seconds</p>
        <div style={{ display: 'flex', gap: 12, justifyContent: 'center' }}>
          <button onClick={() => window.location.reload()} style={styles.ctaPrimary}>Play again</button>
          <button onClick={onDone} style={styles.ctaSecondary}>Done</button>
        </div>
      </div>
    );
  }

  return (
    <div style={styles.studyArea}>
      <div style={styles.studyHeader}>
        <div>
          <div style={styles.studyCount}>{matched.length} / {pool.length / 2} pairs</div>
          <div style={{ fontSize: 13, color: palette.mist, marginTop: 4 }}>{moves} moves</div>
        </div>
        <button onClick={onDone} style={styles.exitBtn}>✕ End session</button>
      </div>

      <div style={styles.matchGrid}>
        {pool.map(card => {
          const isFlipped = flipped.find(f => f.id === card.id) || matched.includes(card.pairId);
          const isMatched = matched.includes(card.pairId);
          return (
            <button
              key={card.id}
              onClick={() => handleFlip(card)}
              style={{
                ...styles.matchCard,
                ...(isFlipped ? styles.matchCardFlipped : {}),
                ...(isMatched ? styles.matchCardMatched : {}),
              }}
            >
              {isFlipped ? (
                card.type === 'kanji' ? (
                  <span style={styles.matchKanji}>{card.char}</span>
                ) : (
                  <span style={styles.matchMeaning}>{card.meaning}</span>
                )
              ) : (
                <span style={styles.matchBack}><JP text="道" reading="みち" /></span>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ============================================================
// QUIZ MODE (Multiple choice)
// ============================================================
function QuizMode({ cards, allCards, showFurigana, onReview, onDone }) {
  const [questions, setQuestions] = useState([]);
  const [index, setIndex] = useState(0);
  const [selected, setSelected] = useState(null);
  const [correct, setCorrect] = useState(0);

  useEffect(() => {
    const pool = [...cards].sort(() => Math.random() - 0.5).slice(0, Math.min(10, cards.length));
    const meaningPool = allCards.map(c => c.meaning);
    const qs = pool.map(card => {
      const wrongs = meaningPool
        .filter(m => m !== card.meaning)
        .sort(() => Math.random() - 0.5)
        .slice(0, 3);
      const options = [card.meaning, ...wrongs].sort(() => Math.random() - 0.5);
      return { ...card, options };
    });
    setQuestions(qs);
  }, []);

  if (questions.length === 0) return <div style={styles.loading}>Preparing quiz…</div>;

  const q = questions[index];

  const handleSelect = async (option) => {
    if (selected !== null) return;
    setSelected(option);
    const isRight = option === q.meaning;
    if (isRight) setCorrect(c => c + 1);
    // Update SRS based on quiz result
    await onReview(q.char, isRight ? 2 : 0);
  };

  const handleNext = () => {
    if (index + 1 >= questions.length) {
      onDone();
    } else {
      setIndex(i => i + 1);
      setSelected(null);
    }
  };

  const isDone = selected !== null;

  return (
    <div style={styles.studyArea}>
      <div style={styles.studyHeader}>
        <div style={styles.studyProgress}>
          <div style={styles.studyCount}>Question {index + 1} / {questions.length}</div>
          <div style={styles.studyBar}>
            <div style={{ ...styles.studyBarFill, width: `${((index) / questions.length) * 100}%` }} />
          </div>
        </div>
        <div style={{ fontFamily: fontDisplay, color: palette.gold }}>{correct} correct</div>
      </div>

      <div style={styles.quizCard}>
        {showFurigana && ((q.on && q.on.length > 0) || (q.kun && q.kun.length > 0)) && (
          <ReadingRow on={q.on} kun={q.kun} />
        )}
        <div style={styles.quizKanji}>{q.char}</div>
        <div style={styles.quizPrompt}>What does this mean?</div>
      </div>

      <div style={styles.quizOptions}>
        {q.options.map(opt => {
          let style = { ...styles.quizOption };
          if (selected !== null) {
            if (opt === q.meaning) style = { ...style, ...styles.quizOptionCorrect };
            else if (opt === selected) style = { ...style, ...styles.quizOptionWrong };
            else style = { ...style, opacity: 0.55 };
          }
          return (
            <button
              key={opt}
              onClick={() => handleSelect(opt)}
              style={style}
              disabled={selected !== null}
            >
              {opt}
            </button>
          );
        })}
      </div>

      {isDone && (
        <div style={styles.quizContinue}>
          <button onClick={handleNext} style={styles.ctaPrimary}>
            {index + 1 >= questions.length ? 'Finish' : 'Next question →'}
          </button>
        </div>
      )}
    </div>
  );
}
